  - id: "007"
    title: "Dual-Mode RBAC — Enterprise + Single-User with Service Extraction"
    category: "Security"
    priority: "High"
    status: "Complete"
    impact: "Enterprise mode enforces AppD RBAC per-user, per-app with fail-closed semantics. Single-user mode retains env-var simplicity for local use. Mode switch via single env var."
    estimated_hours: 10
    actual_hours: 12
    completion_percentage: 100
    completion_date: "2026-04-27"
    dependencies:
      - yaml_id: "001"
        note: "Requires Phase 1 build"
      - yaml_id: "006"
        note: "Cache layer must exist before adding user_app_access cache type"
    technical_summary: |
      Single repo, two modes controlled by APPDYNAMICS_MODE env var (default: enterprise).

      Enterprise mode: VaultClient credentials (MockVaultClient for dev via env vars,
      HashiCorpVaultClient for prod), RBACClient hits /controller/api/rbac/v1/ admin API,
      user_resolver traverses AppD RBAC graph (user → direct roles + groups → each group's
      roles → applicationPermissions canView=true) into a frozenset[str] cached per UPN
      with configurable TTL (APPDYNAMICS_RBAC_CACHE_TTL_S, default 86400s). TokenManager
      duck-types between VaultClient (async get_credentials) and SimpleCredentials (sync).
      require_permission is always enforcing; passes trivially in single-user because
      get_user_role always returns CONFIGURE_ALERTING. _require_app_access called on all
      27 app-scoped tools after permission check. list_applications filters both registry
      fast-path and live-fetch path. Per-UPN asyncio.Lock prevents cold-start serialisation.

      Single-user mode: SimpleCredentials reads APPDYNAMICS_{CTRL}_CLIENT_ID/SECRET env vars.
      No RBAC lookup. All gates pass. No Vault infra required.

      Also extracts 5 service modules from main.py (incident_correlator, team_health,
      trace_stitcher, snapshot_comparator, snapshot_analyzer), adds correlate_incident_window
      as STEP 0 in system prompt, fixes correlate_incident_window missing from permission sets,
      and adds TOKEN_BUDGETS for high-output tools.
    deliverables:
      - "auth/vault_client.py — VaultClient ABC, MockVaultClient, HashiCorpVaultClient, create_vault_client()"
      - "auth/appd_auth.py — dual-mode TokenManager, get_user_role(rbac_client=None), _map_appd_role, enforcing require_permission"
      - "client/rbac_client.py — fail-closed RBAC admin API client"
      - "services/user_resolver.py — UPN → frozenset[str] with per-UPN asyncio.Lock and TTL cache"
      - "services/incident_correlator.py — correlate_incident_window parallel triage"
      - "services/team_health.py — get_team_health_summary semaphore fan-out"
      - "services/trace_stitcher.py — stitch_async_trace correlation ID search"
      - "services/snapshot_comparator.py — compare_snapshots golden registry + auto-scoring"
      - "services/snapshot_analyzer.py — analyze_snapshot parsers + EXCEPTION_STRATEGIES"
      - "models/types.py — ControllerConfig.vault_path + rbac_vault_path fields"
      - "main.py — IS_ENTERPRISE flag, _rbac_clients dict, _get_role dispatch, _require_app_access on 27 tools, dual-mode startup"
      - "tests/unit/test_enterprise_mode.py — 29 tests covering both modes"
      - "tests/unit/test_permissions.py — 32 structural regression tests for permission sets"
      - "tests/unit/test_incident_correlator.py, test_team_health.py, test_trace_stitcher.py, test_snapshot_comparator.py, test_snapshot_analyzer.py — 71 service module tests"
    success_criteria:
      - "✅ APPDYNAMICS_MODE=enterprise: VaultClient used, RBAC graph traversed, per-app access enforced"
      - "✅ APPDYNAMICS_MODE=single_user: SimpleCredentials, always CONFIGURE_ALERTING, no RBAC call"
      - "✅ require_permission enforcing in both modes (trivially passes in single-user)"
      - "✅ _require_app_access fail-closed: empty frozenset denies all apps"
      - "✅ TokenManager duck-types VaultClient vs SimpleCredentials via asyncio.iscoroutinefunction"
      - "✅ 330 tests passing, 0 failures"
    completion_notes:
      - "ENH-007 was originally implemented then deleted when single-user mode was isolated to its own branch"
      - "Re-implemented as proper dual-mode architecture (Option A: single repo, env var switch)"
      - "Enterprise is the default — operators must opt-in to single_user convenience mode"
      - "RBAC client optional per controller: if rbacVaultPath absent, app scoping disabled (allow all) for that controller"
      - "service extractions complete: all Tier 1 tools now in services/, thin wrappers in main.py"

  - id: "008"
    title: "Application Events & Change Correlation (list_application_events)"
    category: "Triage"
    priority: "High"
    status: "Complete"
    impact: "Surfaces deploy markers, config changes, and agent restart patterns directly in triage — eliminates the need to infer change from metric inflection points. Wires include_deploys in correlate_incident_window so every first-pass call includes change context. Reduces MTTx and AI token cost by front-loading the highest-signal diagnostic question: what changed?"
    estimated_hours: 8
    actual_hours: 4
    completion_percentage: 100
    completion_date: "2026-04-27"
    dependencies:
      - yaml_id: "001"
        note: "Requires AppDClient and base tool pattern"
      - yaml_id: "007"
        note: "list_application_events is a VIEW-tier tool; permission sets already wired"
    technical_summary: |
      Three-part build:

      1. AppDClient.get_application_events(app_name, start_ms, end_ms, event_types) — calls
         GET /controller/rest/applications/{appId}/events with BETWEEN_TIMES range and
         comma-separated event types (APPLICATION_DEPLOYMENT, AGENT_EVENT,
         APPLICATION_CONFIG_CHANGE, APP_SERVER_RESTART).

      2. services/event_analyzer.py — fetches events then applies heuristics to produce
         structured change_indicators alongside raw events:
           - explicit_deploy_marker: APPLICATION_DEPLOYMENT event present (HIGH always)
           - probable_rolling_deploy: ≥2 nodes in same tier with AGENT_RESTART within 10 min;
             HIGH if ≥50% of tier nodes affected, MEDIUM otherwise
           - k8s_pod_turnover: AGENT_DISCONNECT + AGENT_CONNECT pairs on different node names
             in same tier within 10 min; HIGH if ≥2 pairs (K8s rolling update pattern)
           - config_change: APPLICATION_CONFIG_CHANGE event (HIGH)
           - single_node_restart: 1 node restart with no tier pattern (LOW — ambiguous)
         Returns: raw_events (capped 50), change_indicators list, change_summary string,
         has_changes bool.

      3. Wire include_deploys in incident_correlator.py (currently a None placeholder at
         line 220) — call event_analyzer.run() in the optional parallel pass alongside
         infra/network. Add change_indicators to the timeline. Prepend to triage_summary:
         "1 probable rolling deploy at 14:32 in checkout-service (5/6 nodes), ...".
         Change include_deploys default to True (single lightweight read, worst case empty).

      Standalone list_application_events tool: full event_analyzer output including raw
      events, for targeted post-mortem or wider look-back queries outside the incident flow.
      Permission tier: VIEW. Token budget: 1500.
    deliverables:
      - "client/appd_client.py — get_application_events() method"
      - "services/event_analyzer.py — heuristics: rolling_deploy, k8s_pod_turnover, config_change, explicit_marker"
      - "services/incident_correlator.py — wire include_deploys, add change_indicators to timeline and triage_summary, default True"
      - "main.py — list_application_events tool (VIEW tier, 1500 token budget)"
      - "auth/appd_auth.py — add list_application_events to _VIEW_TOOLS"
      - "tests/unit/test_permissions.py — add list_application_events to ALL_TOOLS and VIEW assertions"
      - "tests/unit/test_event_analyzer.py — unit tests for each heuristic + correlator integration"
    success_criteria:
      - "list_application_events returns raw_events + change_indicators for a real time window"
      - "Rolling deploy heuristic: ≥2 nodes same tier within 10 min → probable_rolling_deploy"
      - "K8s pod turnover: DISCONNECT+CONNECT pairs on new node names → k8s_pod_turnover HIGH"
      - "include_deploys=True in correlate_incident_window prepends change context to triage_summary"
      - "Empty event list returns has_changes=False with no change_indicators (no false positives)"
      - "Single node restart labelled LOW confidence (ambiguous — not asserted as deploy)"
      - "All existing 330 tests still pass"
    completion_notes: |
      Delivered 2026-04-27. All 5 heuristics implemented in services/event_analyzer.py
      (_analyze). include_deploys default changed to True in both incident_correlator.run()
      and the correlate_incident_window MCP tool. change_indicators added to timeline;
      change_summary prepended to triage_summary when has_changes=True. 26 new tests in
      tests/unit/test_event_analyzer.py. Total test count: 406 (up from 330), 0 failures.
      Tool count: 36 (up from 35).

