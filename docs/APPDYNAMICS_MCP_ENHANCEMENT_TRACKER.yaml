  - id: "006"
    title: "Production Caching Layer — Registries, Golden Baseline, Event-Driven Invalidation"
    category: "Core Build"
    priority: "High"
    status: "Complete"
    impact: "Eliminates redundant AppD API calls across incidents; golden baseline auto-selection survives restarts; deployment/restart events automatically invalidate stale data"
    estimated_hours: 12
    actual_hours: 12
    completion_percentage: 100
    completion_date: "2026-04-12"
    dependencies:
      - yaml_id: "001"
        note: "Requires Phase 1 build"
      - yaml_id: "002"
        note: "Test suite must be green before adding new tests"
    technical_summary: |
      Full production caching layer on top of the existing two-layer cache.
      New modules: utils/cache_keys.py (centralised UPN-namespaced key builder),
      registries/apps_registry.py (AppEntry + AppsRegistry), registries/bt_registry.py
      (BTEntry + BTRegistry), registries/golden_registry.py (GoldenSnapshot + GoldenRegistry,
      24h TTL, shared across users), services/cache_invalidator.py (event-driven invalidation).
      Extended utils/cache.py with TwoLayerCache class (per-data-type TTLCache L1 + diskcache L2,
      Pydantic validation on every read, structural eviction of corrupt entries),
      CachedSnapshotAnalysis model (parsed snapshot cached in-memory only, raw JSON never stored),
      per-data-type stats (hit rate, misses, evictions). Added 29th tool set_golden_snapshot.
      Wired deployment detection (BT count shift > 2) into get_business_transactions and
      restart detection (APP_CRASH / NODE_RESTART) into get_health_violations.
      Extended get_server_health with full cache + registry + invalidation stats.
      All tooling aligned to Python 3.13 (ruff py313, mypy 3.13).
    deliverables:
      - "utils/cache_keys.py — centralised key builder (make_key, golden_key, snapshot_list_key, etc.)"
      - "utils/cache.py — TwoLayerCache, CachedSnapshotAnalysis, per-type stats, NEVER_CACHE set"
      - "registries/apps_registry.py — AppEntry + AppsRegistry"
      - "registries/bt_registry.py — BTEntry + BTRegistry"
      - "registries/golden_registry.py — GoldenSnapshot + GoldenRegistry"
      - "services/cache_invalidator.py — CacheInvalidator (4 event handlers)"
      - "tests/unit/test_cache.py — 47 tests covering all new modules"
      - "tests/integration/test_full_flow.py — 6 end-to-end flow test classes"
      - "tests/contract/test_appd_response_shapes.py — 8 AppD API contract test classes"
      - "main.py — set_golden_snapshot tool, deployment/restart detection, extended health stats"
    success_criteria:
      - "✅ ruff check: all checks passed (0 errors)"
      - "✅ mypy: no issues found in 7 new source files"
      - "✅ pytest tests/unit/test_cache.py: 47 passed"
      - "✅ pytest tests/: 217 passed (0 failures)"
      - "✅ TwoLayerCache Pydantic validation evicts corrupt dicts, passes lists through"
