      - "✅ Python 3.13 consistency: pyproject.toml requires-python >=3.13, ruff py313, mypy 3.13"
    completion_notes:
      - "Fixed mypy: async def set() in cache.py shadows Python builtin set(); resolved by using dict-merge iteration {**hits, **misses} instead of set(x) | set(y)"
      - "Installed types-cachetools for mypy strict compliance on TTLCache"
      - "Fixed no-any-return: TTLCache.get() returns Any without stubs; fixed with explicit type annotation on assignment"
      - "Python version aligned: was py311 in ruff/mypy vs 3.13 in pyproject.toml"

  - id: "007"
    title: "Identity-Scoped Application Access via AppD RBAC"
    category: "Security"
    priority: "High"
    status: "Complete"
    impact: "Users see only the applications their AppDynamics RBAC permits — no cross-team data leakage, principle of least privilege enforced at MCP layer"
    estimated_hours: 6
    actual_hours: 6
    completion_percentage: 100
    completion_date: "2026-04-17"
    dependencies:
      - yaml_id: "001"
        note: "Requires Phase 1 build"
      - yaml_id: "006"
        note: "Cache layer must exist before adding user_app_access cache type"
    technical_summary: |
      Two service accounts per controller: existing data account (VIEW-level, all operational
      API calls) and a new RBAC account (admin read-only, RBAC API only). On first tool call
      from a UPN, user_resolver traverses AppD RBAC — user → direct roles + groups → each
      group's roles → each role's applicationPermissions — unions all app names where
      canView=true into a frozenset, cached 1800s per (upn, controller). list_applications
      filters results to this set; all per-app tools reject app_name not in the set.
      Cache TTL is configurable: 1800s for session-scoped (default), 86400s (daily) or
      604800s (weekly) for large stable organisations where roles rarely change.
    deliverables:
      - "client/rbac_client.py — RBAC admin API client (GET /controller/api/rbac/v1/users|roles|groups)"
      - "services/user_resolver.py — UPN → frozenset[str] accessible app names"
      - "models/types.py — ControllerConfig.rbac_vault_path field"
      - "controllers.json — rbacVaultPath field per controller"
      - "utils/cache_keys.py — user_app_access_key(upn, controller)"
      - "utils/cache.py — user_app_access cache type (configurable TTL)"
      - ".env.example — APPDYNAMICS_PRODUCTION_RBAC_CLIENT_ID/SECRET"
      - "main.py — list_applications filter + per-app tool guards"
    success_criteria:
      - "list_applications returns only apps in user's AppD RBAC app set"
      - "Per-app tools raise PermissionError for apps outside user's access set"
      - "RBAC lookup failure fails closed (empty app set)"
      - "App set cached with configurable TTL (default 86400s daily, tunable via APPDYNAMICS_RBAC_CACHE_TTL_S)"
      - "All 247 tests still passing"
    completion_notes:
      - "client/rbac_client.py — RBAC admin API client (get_user_by_name, get_role, get_group, ping)"
      - "services/user_resolver.py — UPN→frozenset traversal; per-UPN asyncio.Lock (CONC-02 fix included)"
      - "list_applications filters both registry fast-path and live-fetch path by user's app set"
      - "17 per-app tools guarded with _require_app_access(); refresh_user_access tool added (CONFIGURE_ALERTING)"
      - "get_server_health extended with rbac + rate_limiter sections (GAP-12 also closed here)"
      - "CONC-01 fixed in same session: parse_snapshot_errors, find_hot_path, score_golden_candidate, _compare wrapped in asyncio.to_thread"
      - "GAP-08 closed (already done by SCALE-04), GAP-13 closed (tool_results param added to save_runbook)"
      - "Caching strategy documented: diskcache L1/L2 retained; Redis deferred to CONC-03 (future)"

